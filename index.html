<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoC WebGPU - SmolLM2 135M</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 40px auto; max-width: 900px; line-height: 1.5; }
      h1 { color: #333; }
      #status { font-weight: bold; margin: 15px 0; padding: 10px; background: #f0f0f0; border-radius: 6px; }
      textarea { width: 100%; height: 100px; padding: 12px; font-size: 16px; }
      button { padding: 12px 24px; font-size: 16px; background: #0066ff; color: white; border: none; border-radius: 6px; cursor: pointer; }
      button:hover { background: #0052cc; }
      #output {
        margin-top: 20px;
        padding: 15px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 8px;
        min-height: 300px;
        max-height: 60vh;
        overflow-y: auto;
      }
      .message {
        margin-bottom: 18px;
        padding: 10px 14px;
        border-radius: 8px;
      }
      .message.user {
        background: #e3f2fd;
        margin-left: 20%;
      }
      .message.ai {
        background: #f1f8e9;
        margin-right: 20%;
      }
    </style>
  </head>
  <body>
    <h1>PoC Transformers.js v4 + WebGPU</h1>
    <p>Modelo: <strong>Qwen2.5-Coder-0.5B-Instruct</strong> — Ejecutándose 100% en tu navegador</p>

    <div id="status">Iniciando...</div>

    <textarea id="prompt" placeholder="Escribe tu mensaje aquí..."></textarea><br><br>
    <button id="generateBtn">Generar Respuesta</button>

    <div id="output"></div>

    <p><small>La primera carga descarga el modelo. Después queda en caché para uso offline.</small></p>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
